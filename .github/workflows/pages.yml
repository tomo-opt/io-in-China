name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Publish static files to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          WORKDIR="$(mktemp -d)"

          # Build deploy payload by copying repository files except git metadata and workflow config.
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ "${WORKDIR}/"

          cd "${WORKDIR}"
          touch .nojekyll

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "deploy: publish GitHub Pages"
          git push --force "${REPO_URL}" gh-pages
